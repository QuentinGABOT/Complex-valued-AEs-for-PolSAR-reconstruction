# Generic CVNN configuration - shared across all tasks

# Training configuration
nepochs: 500
mode: full
world_size: 4
# seed: 42

# # Early stopping to prevent overfitting
# early_stopping:
#   patience: 10
#   min_delta: 0.001
#   monitor: validation_loss

# Optimizer configuration
optim:
  algo: AdamW
  params:
    lr: 0.0001
    weight_decay: 0.001
    betas: [0.9, 0.999]

# Scheduler configuration with ReduceLROnPlateau for adaptive learning
scheduler:
  name: ReduceLROnPlateau
  params:
    mode: min
    factor: 0.7 # Less aggressive reduction for complex networks
    patience: 10 # Increased patience - complex networks need more time
    min_lr: 0.000001
  # name: CosineAnnealingLR
  # params:
  #   T_max: 150 # Matches total epochs
  #   eta_min: 0.00001 # Minimum learning rate
  #   last_epoch: -1
  # name: CosineAnnealingWarmRestarts
  # params:
  #   T_0: 10 # Initial period for warm restarts
  #   T_mult: 2 # Double the period after each restart
  #   eta_min: 0.005 # Minimum learning rate
  #   last_epoch: -1

# Warmup configuration
warmup:
  epochs: 5

